<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Patient Journey Challenge — Retro Ward Sim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050806;
    --panel: #0d150d;
    --text: #d8ffd8;
    --muted: #93d68c;
    --primary: #39ff14;
    --primary-dark: #1f9d0d;
    --accent: #00e5ff;
    --warn: #ffb000;
    --danger: #ff3b30;
    --good: #39ff14;
    --border: #1f7a0d;
    --chip-bg: #0f1f0f;
    --font-pixel: 'Press Start 2P', monospace;
    --font-terminal: 'VT323', 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-terminal);
  }
  body {
    display: flex; justify-content: center; padding: 20px 14px 60px; position: relative;
    text-shadow: 0 0 2px rgba(216,255,216,0.25);
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px, transparent 2px, transparent 3px);
    mix-blend-mode: multiply;
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
    box-shadow: inset 0 0 120px 40px rgba(0,0,0,0.55);
    animation: crtFlicker 6s infinite;
  }
  @keyframes crtFlicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.97; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bedPulse { 0%, 100% { box-shadow: 0 0 6px var(--accent); } 50% { box-shadow: 0 0 14px var(--accent); } }
  @keyframes workerBob { from { transform: translate(-50%, 0); } to { transform: translate(-50%, -4px); } }
  @keyframes shakeBad { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  @keyframes flashGood { 0% { filter: brightness(1.8); } 100% { filter: brightness(1); } }

  #app { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 16px; }

  .pixel-notch {
    clip-path: polygon(0 10px, 10px 10px, 10px 0, calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px));
  }

  .panel {
    background: var(--panel); border: 3px solid var(--border); padding: 22px;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.6), 0 0 20px rgba(57,255,20,0.06);
    clip-path: polygon(0 10px, 10px 10px, 10px 0, calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px));
  }
  .panel.phase-before { border-color: var(--warn); box-shadow: 6px 6px 0 rgba(0,0,0,0.6), 0 0 20px rgba(255,176,0,0.22); }
  .panel.phase-after { border-color: var(--primary); box-shadow: 6px 6px 0 rgba(0,0,0,0.6), 0 0 20px rgba(57,255,20,0.22); }

  h1 { font-family: var(--font-pixel); font-size: 0.95rem; line-height: 1.8; margin: 0 0 14px; text-transform: uppercase; text-shadow: 2px 2px 0 #000, 0 0 10px currentColor; }
  h2 { font-family: var(--font-pixel); font-size: 0.75rem; line-height: 1.7; margin: 0 0 12px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; color: var(--accent); }
  h3 { font-family: var(--font-pixel); font-size: 0.62rem; line-height: 1.7; margin: 0 0 10px; text-transform: uppercase; color: var(--accent); }
  p { line-height: 1.5; margin: 0 0 10px; font-size: 1.15rem; }
  .muted { color: var(--muted); }
  .center { text-align: center; }
  .small { font-size: 1rem; }

  #hud {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px; justify-content: space-between;
    background: var(--panel); border: 3px solid var(--border); padding: 10px 14px;
    clip-path: polygon(0 8px, 8px 8px, 8px 0, calc(100% - 8px) 0, calc(100% - 8px) 8px, 100% 8px,
      100% calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) 100%,
      8px 100%, 8px calc(100% - 8px), 0 calc(100% - 8px));
  }
  #hud .worker-avatar { display: flex; align-items: center; justify-content: center; flex-shrink: 0; filter: drop-shadow(0 0 4px var(--accent)); image-rendering: pixelated; }
  #hud .stat { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 50px; }
  #hud .stat .val { font-family: var(--font-pixel); font-size: 0.72rem; font-weight: 400; color: var(--primary); text-shadow: 0 0 8px currentColor; }
  #hud .stat .lbl { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }

  .ward-strip { background: #000; border: 3px solid var(--border); padding: 12px 14px 20px; }
  .ward-strip.before { border-color: var(--warn); }
  .ward-strip.after { border-color: var(--primary); }
  .ward-label { font-family: var(--font-pixel); font-size: 0.5rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
  .bed-row { display: flex; gap: 16px; }
  .bed-tile { position: relative; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; border: 2px solid var(--border); background: var(--chip-bg); opacity: 0.35; font-size: 1.4rem; }
  .bed-tile.active { opacity: 1; border-color: var(--accent); animation: bedPulse 1.2s infinite; }
  .bed-occupant { font-size: 1.3rem; }
  .worker-marker { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); animation: workerBob 0.6s infinite alternate; }

  .progress-wrap { width: 100%; height: 14px; background: #000; border: 2px solid var(--border); padding: 2px; }
  .progress-bar { height: 100%; background: repeating-linear-gradient(90deg, var(--primary) 0 6px, var(--primary-dark) 6px 8px); box-shadow: 0 0 8px var(--primary); transition: width 0.3s steps(8); }
  .progress-bar.before { background: repeating-linear-gradient(90deg, var(--warn) 0 6px, #8a5e00 6px 8px); box-shadow: 0 0 8px var(--warn); }
  .progress-label { display: flex; justify-content: space-between; font-size: 1rem; color: var(--muted); margin-top: 8px; text-transform: uppercase; }

  button { font-family: var(--font-pixel); cursor: pointer; border: none; color: var(--text); }
  .btn-primary {
    display: inline-block; background: var(--primary); color: #001a00; border: 3px solid #000;
    padding: 13px 20px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.03em;
    box-shadow: 4px 4px 0 #000, inset -3px -3px 0 rgba(0,0,0,0.35), inset 3px 3px 0 rgba(255,255,255,0.35);
    transition: transform 0.08s ease;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-primary:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #000, inset 3px 3px 0 rgba(0,0,0,0.35); }
  .btn-secondary {
    display: inline-block; background: var(--panel); color: var(--muted); border: 3px solid var(--border);
    padding: 13px 20px; font-size: 0.56rem; text-transform: uppercase; box-shadow: 4px 4px 0 #000;
    transition: transform 0.08s ease;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #000; }
  .btn-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

  /* Role glossary */
  .role-list { list-style: none; padding: 0; margin: 0 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .role-item { display: flex; gap: 10px; align-items: flex-start; background: var(--chip-bg); border: 2px solid var(--border); padding: 10px 12px; }
  .role-item .icon { font-size: 1.3rem; flex-shrink: 0; }
  .role-item .role-name { font-family: var(--font-pixel); font-size: 0.56rem; margin-bottom: 4px; text-transform: uppercase; }
  .role-item .role-desc { font-size: 1rem; color: var(--muted); }

  /* Phase badge */
  .phase-badge { display: inline-block; font-family: var(--font-pixel); font-size: 0.5rem; text-transform: uppercase; border: 2px solid #000; padding: 6px 12px; margin-bottom: 12px; }
  .phase-badge.before { background: var(--warn); color: #1a0f00; }
  .phase-badge.after { background: var(--primary); color: #001a00; }

  .round-label {
    display: inline-block; font-family: var(--font-pixel); font-size: 0.5rem; background: var(--accent); color: #001a1a;
    border: 2px solid #000; padding: 6px 12px; margin-bottom: 12px; margin-right: 6px; text-transform: uppercase;
  }

  .reveal-list { list-style: none; padding: 0; margin: 0 0 16px; }
  .reveal-list li { padding: 9px 10px; margin-bottom: 6px; font-size: 1.05rem; background: var(--chip-bg); border-left: 4px solid currentColor; }
  .reveal-list.bad li { color: var(--danger); }
  .reveal-list.good li { color: var(--good); }

  /* Patient card */
  .patient-card-v2 { display: flex; gap: 14px; align-items: flex-start; border: 2px solid var(--border); padding: 16px; background: var(--chip-bg); margin-bottom: 16px; }
  .avatar-circle {
    width: 60px; height: 60px; border-radius: 0; background: var(--panel); border: 3px solid var(--accent);
    box-shadow: 0 0 10px rgba(0,229,255,0.4);
    display: flex; align-items: center; justify-content: center; font-size: 1.9rem; position: relative; flex-shrink: 0;
  }
  .avatar-circle .badge { position: absolute; bottom: -6px; right: -6px; font-size: 1rem; background: var(--panel); border: 2px solid var(--border); padding: 1px 3px; }
  .patient-card-v2 .info { flex: 1; }
  .patient-card-v2 .name { font-family: var(--font-pixel); font-size: 0.7rem; margin-bottom: 6px; }
  .patient-card-v2 .age { color: var(--muted); font-size: 0.95rem; margin-bottom: 8px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--panel); color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; font-size: 0.9rem; text-transform: uppercase; }
  .callout { border: 2px solid var(--border); background: var(--chip-bg); padding: 10px 14px; font-size: 0.98rem; margin-bottom: 14px; }
  .callout.warn { border-color: var(--warn); background: rgba(255,176,0,0.08); }

  /* AI card */
  .ai-card { border: 2px dashed var(--primary); background: rgba(57,255,20,0.06); padding: 14px 16px; margin-bottom: 16px; }
  .ai-card .ai-title { font-family: var(--font-pixel); font-size: 0.58rem; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
  .confidence-track { height: 12px; background: #000; border: 2px solid var(--border); padding: 1px; margin: 8px 0; }
  .confidence-fill { height: 100%; background: repeating-linear-gradient(90deg, var(--primary) 0 6px, var(--primary-dark) 6px 8px); }
  .confidence-label { font-size: 0.95rem; color: var(--muted); text-transform: uppercase; }

  /* Icon grid buttons */
  .icon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .icon-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .icon-grid.cols-1 { grid-template-columns: 1fr; }
  .icon-grid.cols-1 .icon-card { flex-direction: row; justify-content: flex-start; text-align: left; padding: 12px 16px; }
  .icon-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: var(--chip-bg); border: 3px solid var(--border);
    padding: 14px 8px; font-size: 0.55rem; text-align: center; text-transform: uppercase;
    box-shadow: 3px 3px 0 #000; transition: transform 0.08s ease;
  }
  .icon-card:hover { border-color: var(--primary); box-shadow: 3px 3px 0 #000, 0 0 10px var(--primary); }
  .icon-card:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
  .icon-card .big-icon { font-size: 1.7rem; }
  .icon-card.static { cursor: default; opacity: 0.85; }
  .icon-card.selected { border-color: var(--accent); background: rgba(0,229,255,0.15); box-shadow: 3px 3px 0 #000, 0 0 10px var(--accent); }
  button:disabled { opacity: 0.35; cursor: not-allowed; filter: none; }
  button:disabled:hover, button:disabled:active { transform: none; box-shadow: 4px 4px 0 #000; }

  /* MDT */
  .mdt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0; }
  .mdt-person {
    text-align: center; background: var(--chip-bg); border: 2px solid var(--border);
    padding: 10px 6px; opacity: 0.35; transition: opacity 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease; font-size: 0.9rem;
  }
  .mdt-person.active { opacity: 1; border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
  .mdt-person .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

  /* Feedback banner */
  .feedback { padding: 16px; margin-bottom: 14px; border: 3px solid; }
  .feedback.bad { background: rgba(255,59,48,0.1); border-color: var(--danger); animation: shakeBad 0.4s; }
  .feedback.good { background: rgba(57,255,20,0.1); border-color: var(--good); animation: flashGood 0.5s; }
  .feedback.neutral { background: rgba(255,176,0,0.1); border-color: var(--warn); }
  .feedback .title { font-family: var(--font-pixel); font-size: 0.62rem; margin-bottom: 8px; text-transform: uppercase; }
  .feedback .title::before { content: "▶ "; }
  .correct-answer { margin-top: 10px; padding: 10px 12px; border: 2px solid var(--good); background: rgba(57,255,20,0.08); font-size: 1.05rem; }
  .correct-answer strong { color: var(--good); }
  .delta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .delta-chip { font-family: var(--font-pixel); font-size: 0.5rem; border: 2px solid #000; padding: 5px 9px; }
  .delta-chip.days { background: var(--warn); color: #1a0f00; }
  .delta-chip.rework { background: var(--danger); color: #1a0000; }
  .delta-chip.mdt { background: var(--accent); color: #001a1a; }
  .delta-chip.waste { background: var(--warn); color: #1a0f00; }
  .delta-chip.sat-pos { background: var(--good); color: #001a00; }
  .delta-chip.sat-neg { background: var(--danger); color: #1a0000; }

  /* Dashboard */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0; }
  .stat-box { background: #000; border: 2px solid var(--border); padding: 12px 6px; text-align: center; }
  .stat-box .num { font-family: var(--font-pixel); font-size: 1rem; color: var(--primary); text-shadow: 0 0 8px currentColor; }
  .stat-box .lbl { font-size: 0.9rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; }

  /* Compare bars */
  .compare-row { margin-bottom: 16px; }
  .compare-row .metric-name { font-family: var(--font-pixel); font-size: 0.55rem; margin-bottom: 8px; text-transform: uppercase; }
  .bar-line { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .bar-line .bar-label { width: 60px; text-align: right; font-size: 0.85rem; color: var(--muted); flex-shrink: 0; text-transform: uppercase; }
  .bar-track { flex: 1; height: 16px; background: #000; border: 2px solid var(--border); padding: 1px; }
  .bar-fill { height: 100%; transition: width 0.6s steps(10); }
  .bar-fill.phase-before-fill { background: repeating-linear-gradient(90deg, var(--warn) 0 5px, #8a5e00 5px 7px); }
  .bar-fill.phase-after-fill { background: repeating-linear-gradient(90deg, var(--primary) 0 5px, var(--primary-dark) 5px 7px); }
  .bar-line .bar-val { width: 46px; text-align: right; font-family: var(--font-pixel); font-size: 0.6rem; flex-shrink: 0; }
  .impact-banner {
    text-align: center; background: #000; border: 3px solid var(--primary); color: var(--primary);
    padding: 18px; margin-bottom: 16px; font-family: var(--font-pixel); font-size: 0.62rem; line-height: 1.8;
    text-shadow: 0 0 10px currentColor;
  }

  .blink-cursor { animation: blink 1s steps(1) infinite; }

  @media (max-width: 420px) {
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .icon-grid { grid-template-columns: 1fr 1fr; }
    .icon-grid.cols-3 { grid-template-columns: 1fr; }
    .icon-grid.cols-3 .icon-card { flex-direction: row; justify-content: flex-start; text-align: left; padding: 12px 16px; gap: 10px; }
    .icon-grid.cols-3 .icon-card .big-icon { font-size: 1.4rem; }
    .bed-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  // ---------- SFX (procedural 8-bit sound, Web Audio API) ----------
  var SFX = (function () {
    var ctx = null;
    function getCtx() {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      if (!ctx) ctx = new AC();
      if (ctx.state === "suspended") ctx.resume();
      return ctx;
    }
    function tone(freq, dur, type, delay, gainVal) {
      var c = getCtx();
      if (!c) return;
      try {
        var osc = c.createOscillator();
        var gain = c.createGain();
        osc.type = type || "square";
        osc.frequency.setValueAtTime(freq, c.currentTime + (delay || 0));
        gain.gain.setValueAtTime(0.0001, c.currentTime + (delay || 0));
        gain.gain.linearRampToValueAtTime(gainVal || 0.07, c.currentTime + (delay || 0) + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + (delay || 0) + dur);
        osc.connect(gain); gain.connect(c.destination);
        osc.start(c.currentTime + (delay || 0));
        osc.stop(c.currentTime + (delay || 0) + dur + 0.02);
      } catch (e) {}
    }
    return {
      blip: function () { tone(880, 0.05, "square", 0, 0.05); },
      select: function () { tone(660, 0.045, "square", 0, 0.05); tone(920, 0.06, "square", 0.045, 0.05); },
      success: function () { tone(523, 0.09, "triangle", 0, 0.08); tone(659, 0.09, "triangle", 0.09, 0.08); tone(784, 0.16, "triangle", 0.18, 0.08); },
      error: function () { tone(220, 0.15, "sawtooth", 0, 0.06); tone(140, 0.24, "sawtooth", 0.12, 0.06); },
      transition: function () {
        var c = getCtx();
        if (!c) return;
        try {
          var osc = c.createOscillator(), gain = c.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(200, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(700, c.currentTime + 0.25);
          gain.gain.setValueAtTime(0.06, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.3);
          osc.connect(gain); gain.connect(c.destination);
          osc.start(); osc.stop(c.currentTime + 0.32);
        } catch (e) {}
      },
      step: function (i) { tone(440 + (i || 0) * 60, 0.04, "square", 0, 0.04); }
    };
  })();

  // ---------- Pixel sprite helper (healthcare worker avatar) ----------
  function pixelSprite(pixels, size) {
    size = size || 32;
    var rects = pixels.map(function (p) {
      return '<rect x="' + p[0] + '" y="' + p[1] + '" width="1" height="1" fill="' + p[2] + '"/>';
    }).join("");
    return '<svg viewBox="0 0 8 8" width="' + size + '" height="' + size + '" shape-rendering="crispEdges" style="image-rendering:pixelated;">' + rects + '</svg>';
  }
  var WORKER_PIXELS = [
    [2,0,"#eef3f5"],[3,0,"#eef3f5"],[4,0,"#eef3f5"],[5,0,"#eef3f5"],
    [1,1,"#eef3f5"],[2,1,"#eef3f5"],[3,1,"#ff3b30"],[4,1,"#ff3b30"],[5,1,"#eef3f5"],[6,1,"#eef3f5"],
    [2,2,"#ffcc99"],[3,2,"#ffcc99"],[4,2,"#ffcc99"],[5,2,"#ffcc99"],
    [2,3,"#ffcc99"],[3,3,"#ffcc99"],[4,3,"#ffcc99"],[5,3,"#ffcc99"],
    [1,4,"#00e5ff"],[2,4,"#00e5ff"],[3,4,"#00e5ff"],[4,4,"#00e5ff"],[5,4,"#00e5ff"],[6,4,"#00e5ff"],
    [0,5,"#00e5ff"],[1,5,"#00e5ff"],[2,5,"#00e5ff"],[3,5,"#00e5ff"],[4,5,"#00e5ff"],[5,5,"#00e5ff"],[6,5,"#00e5ff"],[7,5,"#00e5ff"],
    [0,6,"#00e5ff"],[1,6,"#00e5ff"],[3,6,"#00e5ff"],[4,6,"#00e5ff"],[6,6,"#00e5ff"],[7,6,"#00e5ff"],
    [1,7,"#050806"],[2,7,"#050806"],[5,7,"#050806"],[6,7,"#050806"]
  ];

  var ROLE_GLOSSARY = [
    { icon: "🩺", role: "NTFGH Doctor", desc: "Assesses patients and flags who may be suitable for JCH transfer." },
    { icon: "📋", role: "Case Manager", desc: "Actively pulls patients who meet the transfer criteria." },
    { icon: "🔄", role: "Referral Team", desc: "Handles the logistics of actually getting the patient transferred." },
    { icon: "🏥", role: "JCH Doctor", desc: "Assess patient within 48 hours of admission with the aim to transit patient back into the community." },
    { icon: "👥", role: "MDT Team", desc: "Doctors, medical officers, ward nurses, case managers, therapists (PT/OT/ST) and medical social workers, planning care together." }
  ];

  var MDT_STAKEHOLDERS = [
    { icon: "🩺", name: "Doctor" },
    { icon: "⚕️", name: "Medical Officer" },
    { icon: "👩‍⚕️", name: "Ward Nurse" },
    { icon: "📋", name: "Case Manager" },
    { icon: "🏃", name: "Therapy (PT/OT/ST)" },
    { icon: "💼", name: "MSW" }
  ];

  var TRANSFER_OPTIONS = [

  function startTimer() {
    state.startTime = Date.now() - state.elapsedSeconds * 1000;

      state.elapsedSeconds = Math.floor((Date.now() - state.startTime) / 1000);
      var t = document.getElementById("elapsed-timer");
      if (t) t.textContent = formatTime(state.elapsedSeconds);
    }, 1000);
  }
  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function formatTime(sec) {
    var m = Math.floor(sec / 60), s = sec % 60;
    return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);

    var panel = el(

      });
    }, 0);

  function handleTransferBefore(patient, key) {
    var correct = key === patient.before.transferCorrect;
    var feedback;
    if (correct) {
      addSatisfaction(5);
      feedback = { type: "good", title: "Transfer processed.", msg: patient.before.transferCorrectMsg, deltas: [] };
    } else {
      addDays(2); addRework(1); addSatisfaction(-5);
      var correctOpt = TRANSFER_OPTIONS.filter(function (o) { return o.key === patient.before.transferCorrect; })[0];
      feedback = { type: "bad", title: "JCH team requests clarification.", msg: patient.before.transferWrongMsg +
        '<div class="correct-answer">✅ Correct choice: <strong>' + correctOpt.icon + ' ' + correctOpt.label + '</strong><br/>' + patient.before.transferCorrectMsg + '</div>', deltas: [
        { cls: "days", text: "+2 days" }, { cls: "rework", text: "+1 rework" }, { cls: "sat-neg", text: "-5% satisfaction" }
      ] };
    }
    showFeedback(feedback, function () { goToRound(2); });
  }

    selectedReferrals = [];
    var panel = el(
      '<div class="panel phase-before">' +
        '<div class="round-label">Round 2 · Referral</div>' +

        '</div>' +

      '</div>'

      REFERRAL_BUNDLE.forEach(function (r, i) {
        document.getElementById("ref-" + i).onclick = function () {

          if (idx === -1) selectedReferrals.push(r); else selectedReferrals.splice(idx, 1);
          document.getElementById("ref-" + i).classList.toggle("selected");
          document.getElementById("send-bundle-btn").disabled = selectedReferrals.length === 0;
        };
      });
      document.getElementById("send-bundle-btn").onclick = function () {
        SFX.select();
        handleReferralBefore(patient, selectedReferrals.slice());
      };
    }, 0);
    return panel;
  }

  function handleReferralBefore(patient, selected) {
    var needed = patient.referralTrulyNeeded;
    var wasted = selected.filter(function (r) { return needed.indexOf(r) === -1; });
    var missed = needed.filter(function (r) { return selected.indexOf(r) === -1; });
    var feedback;
    if (missed.length > 0) {
      addDays(3); addRework(1); addSatisfaction(-10);
      feedback = {
        type: "bad",
        title: "Referral incomplete.",
        msg: "This patient's essential need went unreferred, causing delays further down the line." +
          '<div class="correct-answer">✅ Needed referral: <strong>' + needed.map(function (r) { return REFERRAL_ICONS[r] + ' ' + r; }).join(", ") + '</strong></div>',
        deltas: [{ cls: "days", text: "+3 days" }, { cls: "rework", text: "+1 rework" }, { cls: "sat-neg", text: "-10% satisfaction" }]
      };
    } else if (wasted.length > 0) {
      addDays(1); addWaste(wasted.length); addSatisfaction(-3);
      feedback = {
        type: "neutral",
        title: "Referral sent — but not all of it was needed.",
        msg: "Only <strong>" + needed.join(", ") + "</strong> was actually necessary. <strong>" + wasted.join(" and ") + "</strong> time was spent on a patient who didn't need it.",
        deltas: [{ cls: "days", text: "+1 day" }, { cls: "waste", text: "+" + wasted.length + " wasted referrals" }, { cls: "sat-neg", text: "-3% satisfaction" }]
      };
    } else {
      addSatisfaction(5);
      feedback = { type: "good", title: "Sent — no wasted time.", msg: "The referral matches exactly what this patient needs.", deltas: [{ cls: "sat-pos", text: "+5% satisfaction" }] };
    }
    showFeedback(feedback, function () { goToRound(3); });
  }

        '</div>' +
      '</div>'

    app.appendChild(panel);
    var i = 0;
    var stepper = setInterval(function () {
      var node = document.getElementById("mdt-p-" + i);

      SFX.step(i);
      i++;
      if (i >= MDT_STAKEHOLDERS.length) { clearInterval(stepper); setTimeout(cont, 500); }
    }, 350);

              type: "good",
              title: "Time well spent.",
              msg: "This case genuinely needed the full team's input — and AI made sure it got prioritised instead of waiting in line.",
              deltas: [{ cls: "days", text: "+2 days" }, { cls: "mdt", text: "+2 MDT hrs" }]
            }, function () { goToRound(4); });
          });
        }
      };
    }, 0);
    return panel;
  }

  // ---------- ROUND 4: DISCHARGE ----------
  function renderDischargeBefore(patient) {
    var b = patient.before;
    var panel = el(
      '<div class="panel phase-before">' +
        '<div class="round-label">Round 4 · Discharge Planning</div>' +
        patientCardHtml(patient) +
        '<p class="callout warn"><strong>Estimated Discharge Date:</strong> ' + b.eddRangeText + '<br/>Planning only starts now that he/she is medically ready.</p>' +
        '<p class="small"><strong>Challenge:</strong> ' + b.destinationChallenge + '</p>' +
        '<h3>Where does this patient go next?</h3>' +
        iconGridHtml("r4", DEST_ALL.map(function (d) { return { icon: DEST_ICONS[d], label: d, key: d }; }), 2) +
      '</div>'
    );
    setTimeout(function () {
      DEST_ALL.forEach(function (dest, i) {
        document.getElementById("r4-" + i).onclick = function () { SFX.select(); handleDischargeBefore(patient, dest); };
      });
    }, 0);
    return panel;
  }

  function handleDischargeBefore(patient, dest) {
    addDays(2);
    var feedback;
    if (dest === patient.destinationCorrect) {
      curStats().discharges += 1; addSatisfaction(5);
      feedback = { type: "neutral", title: "Right placement — eventually.", msg: "Planning started late, so it took longer than it should have.", deltas: [{ cls: "days", text: "+2 days" }, { cls: "sat-pos", text: "+5% satisfaction" }] };
    } else {
      addDays(3); addRework(1); addSatisfaction(-15);
      feedback = { type: "bad", title: "Placement unsuitable.", msg: "Application rejected. Readmission risk increased." +
        '<div class="correct-answer">✅ Correct placement: <strong>' + DEST_ICONS[patient.destinationCorrect] + ' ' + patient.destinationCorrect + '</strong><br/>' + patient.after.aiDestinationReason + '</div>', deltas: [{ cls: "days", text: "+5 days" }, { cls: "rework", text: "+1 rework" }, { cls: "sat-neg", text: "-15% satisfaction" }] };
    }
    showFeedback(feedback, function () { afterRound4(patient); });
  }

  function renderDischargeAfter(patient) {
    var a = patient.after;
    var panel = el(
      '<div class="panel phase-after">' +
        '<div class="round-label">Round 4 · Discharge Planning</div>' +
        patientCardHtml(patient) +
        '<div class="ai-card">' +
          '<div class="ai-title">🤖 AI Recommendation (set Day 1)</div>' +
          '<div class="confidence-track"><div class="confidence-fill" style="width:' + a.aiEddConfidence + '%;"></div></div>' +
          '<div class="confidence-label">Discharge Day ' + a.aiEdd + ' · ' + a.aiEddConfidence + '% confidence</div>' +
          '<div class="icon-grid cols-1" style="margin-top:10px;"><div class="icon-card static"><span class="big-icon">' + DEST_ICONS[patient.destinationCorrect] + '</span><span>' + patient.destinationCorrect + '</span></div></div>' +
          '<p class="small" style="margin-top:8px;">' + a.aiDestinationReason + '</p>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn-primary" id="endorse-discharge-btn">✅ Endorse & Proceed to Discharge</button>' +
          '<button class="btn-secondary" id="manual-discharge-btn">🔍 Manual Review Instead</button>' +
        '</div>' +
      '</div>'
    );
    setTimeout(function () {
      document.getElementById("endorse-discharge-btn").onclick = function () { SFX.select(); handleDischargeAfter(patient); };
      document.getElementById("manual-discharge-btn").onclick = function () {
        SFX.select();
        addDays(2);
        showFeedback({ type: "neutral", title: "Reassessed manually.", msg: "Skipping the AI's recommendation means falling back to a manual discharge planning process — same delays as before AI.", deltas: [{ cls: "days", text: "+2 days" }] }, function () { afterRound4(patient); });
      };
    }, 0);
    return panel;
  }

  function handleDischargeAfter(patient) {
    curStats().discharges += 1; addSatisfaction(10);
    var feedback = { type: "good", title: "Right-sited from Day 1.", msg: "Planning started on admission — no last-minute scramble.", deltas: [{ cls: "sat-pos", text: "+10% satisfaction" }] };
    showFeedback(feedback, function () { afterRound4(patient); });
  }

  // ---------- FEEDBACK ----------
  function showFeedback(feedback, cont) {
    if (feedback.type === "good") SFX.success();
    else if (feedback.type === "bad") SFX.error();
    else SFX.blip();
    var app = shellStart();
    var deltasHtml = (feedback.deltas || []).map(function (d) { return '<span class="delta-chip ' + d.cls + '">' + d.text + '</span>'; }).join("");
    var panel = el(
      '<div class="panel">' +
        '<div class="feedback ' + feedback.type + '">' +
          '<div class="title">' + feedback.title + '</div>' +
          '<div>' + feedback.msg + '</div>' +
          (deltasHtml ? '<div class="delta-row">' + deltasHtml + '</div>' : '') +
        '</div>' +
        '<div class="btn-row"><button class="btn-primary" id="feedback-continue">Continue ▶</button></div>' +
      '</div>'
    );
    app.appendChild(panel);
    setTimeout(function () {
      document.getElementById("feedback-continue").onclick = function () { SFX.blip(); cont(); };
    }, 0);
  }

  // ---------- ACT SUMMARY (BEFORE → AFTER transition) ----------
  function renderActSummary() {
    var s = state.stats.before;
    var wrap = el('<div></div>');
    wrap.appendChild(el(
      '<div class="panel phase-before">' +
        '<div class="phase-badge before">Phase 1 Complete</div>' +
        '<h1>BEFORE Process — Results</h1>' +
        '<div class="stat-grid">' +
          '<div class="stat-box"><div class="num">' + s.days + '</div><div class="lbl">Total Days</div></div>' +
          '<div class="stat-box"><div class="num">' + s.rework + '</div><div class="lbl">Rework</div></div>' +
          '<div class="stat-box"><div class="num">' + s.mdtHours + '</div><div class="lbl">MDT Hours</div></div>' +
          '<div class="stat-box"><div class="num">' + s.waste + '</div><div class="lbl">Wasted Referrals</div></div>' +
          '<div class="stat-box"><div class="num">' + s.satisfaction + '%</div><div class="lbl">Satisfaction</div></div>' +
          '<div class="stat-box"><div class="num">' + s.discharges + '/2</div><div class="lbl">Discharges</div></div>' +
        '</div>' +
        '<h3>What slowed you down</h3>' +
        '<ul class="reveal-list bad">' +
          '<li>❌ Unclear transfer criteria</li>' +
          '<li>❌ Blanket default referrals waste resources</li>' +
          '<li>❌ MDT reviews every case equally, regardless of complexity</li>' +
          '<li>❌ Discharge planning starts late, with incomplete information</li>' +
        '</ul>' +
        '<div class="center"><button class="btn-primary" id="to-after-btn">▶ Try the AI-Assisted Version</button></div>' +
      '</div>'
    ));
    setTimeout(function () {
      document.getElementById("to-after-btn").onclick = function () { SFX.transition(); state.screen = "after-banner"; render(); };
    }, 0);
    return wrap;
  }

  // ---------- FINAL DASHBOARD ----------
  function compareRow(label, before, after, maxVal) {
    var max = maxVal || Math.max(before, after, 1);
    return (
      '<div class="compare-row">' +
        '<div class="metric-name">' + label + '</div>' +
        '<div class="bar-line"><span class="bar-label">Before</span><div class="bar-track"><div class="bar-fill phase-before-fill" style="width:' + Math.round(before / max * 100) + '%;"></div></div><span class="bar-val">' + before + '</span></div>' +
        '<div class="bar-line"><span class="bar-label">After</span><div class="bar-track"><div class="bar-fill phase-after-fill" style="width:' + Math.round(after / max * 100) + '%;"></div></div><span class="bar-val">' + after + '</span></div>' +
      '</div>'
    );
  }

  function renderFinalDashboard() {
    var b = state.stats.before;
    var a = state.stats.after;
    var dayCut = b.days > 0 ? Math.round((1 - a.days / b.days) * 100) : 0;
    var wrap = el('<div></div>');
    wrap.appendChild(el(
      '<div class="panel phase-after">' +
        '<div class="phase-badge after">Phase 2 Complete</div>' +
        '<h1>Same Patients, Two Systems</h1>' +
        '<div class="impact-banner">AI-ASSISTED PROCESS CUT<br/>TOTAL DAYS BY ' + Math.max(dayCut, 0) + '%</div>' +
        compareRow("Total Days", b.days, a.days) +
        compareRow("Rework Events", b.rework, a.rework) +
        compareRow("MDT Hours", b.mdtHours, a.mdtHours) +
        compareRow("Wasted Referrals", b.waste, a.waste) +
        '<div class="stat-grid">' +
          '<div class="stat-box"><div class="num">' + a.satisfaction + '%</div><div class="lbl">After Satisfaction</div></div>' +
          '<div class="stat-box"><div class="num">' + b.satisfaction + '%</div><div class="lbl">Before Satisfaction</div></div>' +
          '<div class="stat-box"><div class="num">' + a.discharges + '/2</div><div class="lbl">After Discharges</div></div>' +
        '</div>' +
      '</div>'
    ));
    wrap.appendChild(el(
      '<div class="panel">' +
        '<div class="phase-badge after">Project ENCHANTED Vision</div>' +
        '<ul class="reveal-list good">' +
          '<li>✅ AI automatically identifies transfer-ready patients — clinicians simply endorse</li>' +
          '<li>✅ Discharge date estimated from Day 1 of admission</li>' +
          '<li>✅ MDT time prioritised — only complex cases get the full discussion</li>' +
          '<li>✅ Referrals targeted to actual need, not sent by default</li>' +
          '<li>✅ Discharge planning starts early, with the right site identified sooner</li>' +
        '</ul>' +
        '<div class="center"><button class="btn-primary" id="restart-btn">▶ Play Again</button></div>' +
      '</div>'
    ));
    setTimeout(function () {
      document.getElementById("restart-btn").onclick = function () {
        SFX.transition();
        stopTimer();
        state = freshState();
        state.screen = "intro";
        render();
      };
    }, 0);
    return wrap;
  }

  // ---------- INIT ----------
  state = freshState();
  render();
})();
</script>
</body>
</html>
